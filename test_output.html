<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Laravel</title>
    <link rel="stylesheet" href="http://localhost:8000/css/fontawesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 50%, #f5f0ff 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        .page-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
        }

        .page-header h1::before {
            content: '';
            width: 5px;
            height: 36px;
            background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
            border-radius: 3px;
        }

        .page-header p {
            font-size: 16px;
            color: #64748b;
            max-width: 500px;
            margin: 0 auto;
        }

        .competitions-grid {
            display: flex;
            gap: 28px;
            overflow-x: auto;
            padding: 10px 4px 20px 4px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .competitions-grid::-webkit-scrollbar {
            height: 8px;
        }

        .competitions-grid::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .competitions-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 4px;
        }

        .competition-card {
            flex: 0 0 380px;
            scroll-snap-align: start;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .competition-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .competition-card:hover::before {
            opacity: 1;
        }

        .competition-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.15);
            border-color: #bfdbfe;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .card-image {
            width: 100%;
            height: 240px;
            overflow: hidden;
            position: relative;
            background: #f1f5f9;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .competition-card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #94a3b8;
            font-size: 48px;
        }

        .card-body {
            padding: 24px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-description {
            font-size: 14px;
            color: #64748b;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
        }

        .card-date {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-badge {
            padding: 4px 12px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            color: #2563eb;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                padding: 24px 16px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .competition-card {
                flex: 0 0 300px;
            }

            .card-image {
                height: 180px;
            }
        }
    </style>
</head>
